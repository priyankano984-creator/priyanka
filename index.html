<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow:hidden;
    }

    .card{
      width:350px;
      padding:30px;
      text-align:center;
      background:white;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      animation: float 3s ease-in-out infinite;
    }

    h1{
      color:#ff4081;
      font-size:40px;
      margin-bottom:15px;
    }
    h2{
        color:#ff4081;
        font-size:40px

    }

    p{
      color:#555;
      font-size:18px;
      line-height:1.6;
      margin-bottom:20px;
    }

    .cake{
      font-size:70px;
      animation: bounce 1.5s infinite;
    }

    .btn{
      display:inline-block;
      padding:12px 25px;
      background:#ff4081;
      color:white;
      text-decoration:none;
      border-radius:30px;
      transition:0.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#e91e63;
      transform:scale(1.05);
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    .balloon{
      position:absolute;
      bottom:-150px;
      width:60px;
      height:80px;
      background:red;
      border-radius:50%;
      animation: rise 10s infinite ease-in;
    }

    .balloon::after{
      content:"";
      position:absolute;
      width:2px;
      height:80px;
      background:#333;
      left:50%;
      top:80px;
    }

    .balloon:nth-child(1){
      left:10%;
      background:#ff4d4d;
      animation-duration:8s;
    }

    .balloon:nth-child(2){
      left:30%;
      background:#4da6ff;
      animation-duration:10s;
    }

    .balloon:nth-child(3){
      left:50%;
      background:#66ff66;
      animation-duration:7s;
    }

    .balloon:nth-child(4){
      left:70%;
      background:#ffcc00;
      animation-duration:9s;
    }

    .balloon:nth-child(5){
      left:90%;
      background:#cc66ff;
      animation-duration:11s;
    }

    @keyframes rise{
      0%{
        transform:translateY(0);
      }
      100%{
        transform:translateY(-120vh);
      }
    }
  </style>
</head>

<body>

  <!-- Balloons -->
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>

  <!-- Birthday Card -->
  <div class="card">
    <div class="cake">🎂</div>
    <h1>Happy Birthday!</h1>
    <h2>Dheduu💗</h2>

    <p>
      May God Fullfill all ur dreams and u become successful in ur life.
      Have an amazing birthday celebration!
    </p>

    <a href="#" class="btn">Celebrate 🎉</a>
  </div>

</body>
</html>
